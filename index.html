<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://ianlunn.github.io/Hover/css/hover.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.0.2/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>lion_thippila</title>
</head>
<body id="body" data-aos-easing="ease" data-aos-duration="400" data-aos-delay="0">
    <div class="container">
        <img id="Background" src="/2.jpg" alt="Background">
        <div class="text-center img-content">
            <img id="vincent" src="/1.jpg" alt="Artist">
            <div>
                <h1 class="ml13">
                    <span class="letters">LION</span>
                </h1>
                <p class="subtitle1">Hello, my name is Siraphop Thippila.</p>
            </div>
        </div>
        <div class="content-social">
            <p class="subtitle2">Welcome to my website!</p>
            <div class="test2">
                <a href="https://twitter.com/WINRAR5555" target="_blank" class="btn hvr-buzz"><i class="bi bi-twitter" style="color:white;"></i></a>
                <a href="https://www.facebook.com/lion.thippila/" target="_blank" class="btn hvr-buzz"><i class="bi bi-facebook" style="color:white;"></i></a>
                <a href="https://www.instagram.com/lion_thippila/" target="_blank" class="btn hvr-buzz"><i class="bi bi-instagram" style="color:white;"></i></a>
                <a href="https://www.youtube.com/channel/UCNh32EcdB0yzN8Nm6bdVm9w" target="_blank" class="btn hvr-buzz"><i class="bi bi-youtube" style="color:white;"></i></a>
            </div>
        </div>
    </div>
    <script>
        var audio = new Audio("https://files.catbox.moe/hr0qsd.mp3");
        $("#body").click(function() {
            audio.play();
            audio.volume = 0.05;
        });
        AOS.init();
        anime.timeline({ loop: false })
            .add({
                targets: '.ml13 .letter',
                translateY: [50, 0],
                translateZ: 0,
                opacity: [0, 1],
                easing: "easeOutExpo",
                duration: 1400,
                delay: (el, i) => 300 + 30 * i
            });
    </script>
</body>
</html>
